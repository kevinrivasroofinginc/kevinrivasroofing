<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin Rivas Roofing Inc</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: #222;
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    background: #0a0a0a;
    color: white;
    position: sticky;
    top: 0;
    z-index: 1000;
}

nav img {
    height: 50px;
}

.nav-links {
    display: flex;
    gap: 18px;
}

.nav-links a {
    color: white;
    text-decoration: none;
    font-size: 14px;
}

/* HERO */
.hero {
    background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
    url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover no-repeat;
    height: 95vh;
    display: flex;
    align-items: center;
    padding: 0 40px;
    color: white;
}

.hero-content {
    max-width: 700px;
}

.badge {
    background: #caa74a;
    padding: 8px 15px;
    display: inline-block;
    margin-bottom: 15px;
}

.hero h1 {
    font-size: 60px;
}

.hero p {
    font-size: 20px;
}

.buttons {
    margin-top: 30px;
}

.call-btn, .estimate-btn {
    padding: 15px 25px;
    text-decoration: none;
    margin-right: 10px;
}

.call-btn {
    background: #caa74a;
    color: black;
    font-weight: bold;
}

.estimate-btn {
    border: 2px solid #caa74a;
    color: white;
}

/* SERVICES */
.section {
    padding: 70px 40px;
    text-align: center;
}

.services {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
}

.card {
    padding: 25px;
    background: #f4f4f4;
    border-radius: 12px;
}

/* CONTACT FORM */
#contact input, #contact textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
}

#contact button {
    padding: 15px;
    width: 100%;
    background: #caa74a;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

/* FOOTER */
footer {
    background: #0b0b0b;
    color: white;
    text-align: center;
    padding: 30px;
}

/* MOBILE */
@media (max-width: 768px) {
    .hero h1 { font-size: 42px; }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <img src="logo.png.PNG" alt="Logo">
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <div class="hero-content">
        <div class="badge">PREMIUM ROOFING SOLUTIONS</div>
        <h1>Kevin Rivas Roofing Inc</h1>
        <p>Elite Roofing Solutions Across California</p>

        <div class="buttons">
            <a href="tel:14424610326" class="call-btn">Call Now</a>
            <a href="#contact" class="estimate-btn">Get Estimate</a>
        </div>
    </div>
</section>

<!-- SERVICES -->
<section id="services" class="section">
    <h2>Our Roofing Services</h2>
    <div class="services">
        <div class="card"><h3>Roof Replacements</h3></div>
        <div class="card"><h3>Leak Repairs</h3></div>
        <div class="card"><h3>Shingle & Tile</h3></div>
        <div class="card"><h3>Flat Roofing</h3></div>
    </div>
</section>

<!-- CONTACT -->
<section id="contact" class="section">
    <h2>Request a Free Estimate</h2>

    <form action="https://formspree.io/f/xdabkpzq" method="POST">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="tel" name="phone" placeholder="Phone Number" required>
        <input type="email" name="email" placeholder="Email" required>
        <textarea name="message" placeholder="Describe your roofing job"></textarea>
        <button type="submit">Get Estimate</button>
    </form>

</section>

<!-- FOOTER -->
<footer>
    <p>Kevin Rivas Roofing Inc</p>
    <p>📞 442-461-0326</p>
</footer>

</body>
</html>
